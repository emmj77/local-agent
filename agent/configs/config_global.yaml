# Config globale Local_Agent — dashboard, telegram, watcher
# Les configs d'instance sont dans configs/<nom>.yaml

agents:
  - agent_id: "agent1"
    redis_key: "agent1"
    model: "glm-5.2"
    endpoint: "cloud"
    agent_type: "standard"
    name: "Agent 1"
    role: "Agent principal"
  - agent_id: "agent2"
    redis_key: "agent2"
    model: "gemma4:31b"
    endpoint: "cloud"
    agent_type: "standard"
    name: "Agent 2"
    role: "Agent secondaire"
  - agent_id: "agent3"
    redis_key: "agent3"
    model: "deepseek-reasoner"
    endpoint: "deepseek_api"
    agent_type: "standard"
    name: "Agent 3"
    role: "Raisonnement profond"
  - agent_id: "agentlocal"
    redis_key: "agentlocal"
    model: "llama-cpp-local"
    endpoint: "llamacpp"
    agent_type: "local"
    name: "Agent Local"
    role: "Subagent harnais léger"
  - agent_id: "subagent1"
    redis_key: "subagent1"
    model: "gemini-2.5-flash-lite"
    endpoint: "gemini"
    agent_type: "standard"
    name: "Subagent 1"
    role: "Cloud gratuit (Gemini)"
  - agent_id: "subagent2"
    redis_key: "subagent2"
    model: "TBD"
    endpoint: "cloud_paid"
    agent_type: "standard"
    name: "Subagent 2"
    role: "Cloud payant qualité max"